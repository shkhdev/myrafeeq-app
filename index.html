<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>MyRafeeq</title>
    <meta name="description" content="Your Islamic companion" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Pre-Sentry safety net: show raw errors only while JS bundle is loading.
      // Once Sentry.init() runs, it sets __SENTRY_LOADED__ and these become no-ops.
      window.onerror = (m, s, l, c, e) => {
        if (window.__SENTRY_LOADED__) return;
        document.body.innerHTML =
          '<pre style="color:red;padding:20px;word-break:break-all">' +
          m + "\n" + s + ":" + l + ":" + c + "\n" + ((e?.stack) || "") +
          "</pre>";
      };
      window.onunhandledrejection = (e) => {
        if (window.__SENTRY_LOADED__) return;
        document.body.innerHTML =
          '<pre style="color:red;padding:20px;word-break:break-all">Unhandled: ' +
          (e.reason?.stack ? e.reason.stack : e.reason) +
          "</pre>";
      };
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
